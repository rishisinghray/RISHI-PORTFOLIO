<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RISHI Portfolio — Sign In</title>
<link rel="stylesheet" href="style.css"/>
<style>
/* ── Extra login styles ──────────────────────────── */
.login-card { max-width: 440px; }

/* Step indicator */
.step-bar {
  display: flex; align-items: center; gap: 0;
  margin-bottom: 28px;
}
.step {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--fmono); font-size: .56rem;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--td); transition: color .3s;
}
.step.on { color: var(--cyan); }
.step.done { color: var(--green); }
.step-dot {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid currentColor;
  display: flex; align-items: center; justify-content: center;
  font-size: .6rem; flex-shrink: 0; transition: all .3s;
}
.step.on .step-dot { background: rgba(0,229,255,.12); box-shadow: var(--cglow); }
.step.done .step-dot { background: rgba(0,255,170,.12); }
.step-line { flex: 1; height: 1px; background: var(--bdr); margin: 0 8px; }

/* Google verify badge */
.g-verify-badge {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px;
  background: rgba(0,229,255,.04);
  border: 1px solid var(--bdr);
  border-radius: 2px;
  font-family: var(--fmono); font-size: .64rem;
  letter-spacing: 1px; color: var(--tm);
  margin-bottom: 4px;
}
.g-verify-badge .check {
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(0,255,170,.15); border: 1px solid var(--green);
  display: flex; align-items: center; justify-content: center;
  color: var(--green); font-size: .7rem; flex-shrink: 0;
}
.g-verify-badge .pending {
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(0,229,255,.1); border: 1px solid var(--cyan);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.g-dot-spin {
  width: 8px; height: 8px; border-radius: 50%;
  border: 1.5px solid var(--cyan); border-top-color: transparent;
  animation: spin .6s linear infinite;
}

/* OTP inputs */
.otp-row { display: flex; gap: 10px; justify-content: center; }
.otp-box {
  width: 48px; height: 58px; text-align: center;
  font-family: var(--fmono); font-size: 1.5rem; font-weight: 700;
  color: var(--cyan); background: rgba(0,229,255,.05);
  border: 1px solid var(--bdr); outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
  border-radius: 2px; caret-color: var(--cyan);
}
.otp-box:focus { border-color: var(--cyan); box-shadow: var(--cglow); background: rgba(0,229,255,.08); }
.otp-box.ok   { border-color: rgba(0,229,255,.5); background: rgba(0,229,255,.07); }

/* Resend */
.resend-row { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
.resend-btn {
  font-family: var(--fmono); font-size: .58rem; letter-spacing: 2px;
  color: var(--cyan); background: none; border: none;
  text-transform: uppercase; padding: 0; transition: text-shadow .2s;
}
.resend-btn:not(:disabled):hover { text-shadow: var(--cglow); }
.resend-btn:disabled { color: var(--td); }
.resend-cd { font-family: var(--fmono); font-size: .58rem; color: var(--td); letter-spacing: 1px; }

/* Back link */
.back-link {
  font-family: var(--fmono); font-size: .56rem; letter-spacing: 1px;
  color: var(--td); background: none; border: none;
  padding: 0; margin-top: 10px; display: block;
  transition: color .2s;
}
.back-link:hover { color: var(--cyan); }

/* Method divider */
.method-divider {
  display: flex; align-items: center; gap: 12px; margin: 18px 0;
}
.mdl { flex: 1; height: 1px; background: var(--bdr); }
.mdt {
  font-family: var(--fmono); font-size: .54rem;
  letter-spacing: 2px; color: var(--td); white-space: nowrap;
}

/* Otp hint */
.otp-hint {
  font-family: var(--fmono); font-size: .62rem;
  letter-spacing: 1px; color: var(--td); margin-bottom: 16px;
  line-height: 1.7;
}
.otp-hint strong { color: var(--cyan); }
</style>
</head>
<body>
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<canvas id="bg-canvas"></canvas>
<div class="scanlines"></div>
<div class="toast toast-info" id="toast"></div>

<div class="login-page">
  <div class="login-card glass" style="position:relative">
    <div class="hc tl"></div><div class="hc tr"></div>
    <div class="hc bl"></div><div class="hc br"></div>

    <!-- Logo -->
    <div class="login-logo">RISHI</div>
    <div class="login-sub">// Portfolio OS — Authentication Required</div>

    <!-- ══════════════════════════════
         STEP 1 — Choose Method
    ══════════════════════════════ -->
    <div id="step1">
      <div class="step-bar">
        <div class="step on" id="s1dot"><div class="step-dot">1</div><span>Verify</span></div>
        <div class="step-line"></div>
        <div class="step" id="s2dot"><div class="step-dot">2</div><span>Access</span></div>
      </div>

      <!-- Google -->
      <p class="auth-lbl" style="margin-bottom:11px">Google Verification</p>
      <button class="btn btn-pink btn-full" id="googleBtn" style="margin-bottom:6px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" style="flex-shrink:0">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        <span>Verify with Google</span>
      </button>
      <p id="gVerifyStatus" style="display:none" class="g-verify-badge">
        <span class="pending" id="gPending"><div class="g-dot-spin"></div></span>
        <span id="gStatusText">Waiting for Google...</span>
      </p>

      <div class="method-divider">
        <div class="mdl"></div>
        <span class="mdt">or verify via email OTP</span>
        <div class="mdl"></div>
      </div>

      <!-- Email OTP -->
      <p class="auth-lbl" style="margin-bottom:11px">Email OTP Verification</p>
      <div class="fg" style="margin-bottom:12px">
        <label class="fl">Your Email Address</label>
        <input type="email" class="fi" id="emailInp" placeholder="you@example.com" autocomplete="email"/>
      </div>
      <div class="msg" id="emailMsg"></div>
      <button class="btn btn-cyan btn-full" id="sendOtpBtn" style="margin-top:10px"><span>Send OTP Code →</span></button>
    </div>

    <!-- ══════════════════════════════
         STEP 2 — Enter OTP
    ══════════════════════════════ -->
    <div id="step2" style="display:none">
      <div class="step-bar">
        <div class="step done" id="s1dot2"><div class="step-dot">✓</div><span>Verified</span></div>
        <div class="step-line"></div>
        <div class="step on" id="s2dot2"><div class="step-dot">2</div><span>Access</span></div>
      </div>

      <p class="otp-hint">
        Code sent to <strong id="otpEmailLbl"></strong><br>
        Enter the 6-digit code below. Valid for 10 minutes.
      </p>

      <div class="otp-row" id="otpRow">
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
        <input class="otp-box" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]"/>
      </div>

      <div class="msg" id="otpMsg" style="margin-top:10px"></div>
      <button class="btn btn-cyan btn-full" id="verifyBtn" style="margin-top:14px"><span>Verify &amp; Enter →</span></button>

      <div class="resend-row">
        <button class="resend-btn" id="resendBtn" disabled>Resend Code</button>
        <span class="resend-cd" id="resendCd"></span>
      </div>
      <button class="back-link" id="backBtn">← Change email or method</button>
    </div>

    <p style="font-family:var(--fmono);font-size:.5rem;color:var(--td);letter-spacing:1px;text-align:center;margin-top:18px">
      Secure · OTP verified · Firebase powered
    </p>
  </div>
</div>

<!-- Base scripts (non-module) -->
<script>
// Cursor
const dot=document.getElementById('cur-dot'),ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function loop(){dot.style.left=mx+'px';dot.style.top=my+'px';rx+=(mx-rx-15)*.1;ry+=(my-ry-15)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop)})();
document.querySelectorAll('button,a,input').forEach(el=>{
  el.addEventListener('mouseenter',()=>ring.classList.add('big'));
  el.addEventListener('mouseleave',()=>ring.classList.remove('big'));
});
// Matrix rain
const cv=document.getElementById('bg-canvas'),ctx=cv.getContext('2d');
const chars='01アイウエオカキクケコ{}[]<>/\\|';
let drops=[];
function rsz(){cv.width=innerWidth;cv.height=innerHeight;drops=Array(Math.floor(cv.width/15)).fill(1)}
function drw(){
  ctx.fillStyle='rgba(2,4,14,0.07)';ctx.fillRect(0,0,cv.width,cv.height);
  ctx.font='12px Share Tech Mono,monospace';
  drops.forEach((y,i)=>{
    ctx.fillStyle=`rgba(0,229,255,${y*15<cv.height*.28?.7:.28})`;
    ctx.fillText(chars[Math.floor(Math.random()*chars.length)],i*15,y*15);
    if(y*15>cv.height&&Math.random()>.975)drops[i]=0;drops[i]++;
  });
}
rsz();setInterval(drw,50);window.addEventListener('resize',rsz);
</script>

<script type="module">
import { auth } from './firebase-config.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
  sendOTP, verifyOTP, googleLogin, saveUser,
  setSession, getSession, checkAdmin
} from './auth.js';

// ── Helpers ────────────────────────────────────────
const $  = id => document.getElementById(id);
function toast(msg, type='info') {
  const t=$('toast'); t.textContent=msg; t.className=`toast toast-${type} on`;
  setTimeout(()=>t.classList.remove('on'),3600);
}
function showMsg(id, txt, type) {
  const el=$(id); el.textContent=txt; el.className=`msg msg-${type}`; el.style.display='block';
}
function hideMsg(id) { $(id).style.display='none'; }
function setLoad(id, on, txt) {
  const b=$(id); b.disabled=on;
  b.querySelector('span').innerHTML = on ? `<span class="bspin"></span> ${txt}` : txt;
}

// ── Redirect if already logged in ─────────────────
const sess   = getSession();
const fbUser = await new Promise(r=>{ const u=onAuthStateChanged(auth,f=>{u();r(f)}); });
if (fbUser || sess) {
  const adm = checkAdmin(fbUser?.uid||sess?.uid||'', fbUser?.email||sess?.email||'');
  location.href = adm ? 'admin.html' : 'portfolio.html';
}

// ── Session redirect helper ────────────────────────
function doRedirect(u) {
  const adm = checkAdmin(u.uid, u.email);
  setSession({
    uid: u.uid, email: u.email,
    name: u.displayName || u.email.split('@')[0],
    photo: u.photoURL || '',
    isAdmin: adm,
    method: u._method || 'email',
  });
  toast('// ACCESS GRANTED', 'ok');
  setTimeout(()=> location.href = adm ? 'admin.html' : 'portfolio.html', 800);
}

// ── Google login + Google verification ────────────
$('googleBtn').addEventListener('click', async () => {
  const status = $('gVerifyStatus');
  status.style.display = 'flex';
  $('gStatusText').textContent = 'Connecting to Google...';
  try {
    const u = await googleLogin();
    $('gPending').innerHTML = '<span style="color:var(--green)">✓</span>';
    $('gPending').style.background = 'rgba(0,255,170,.15)';
    $('gPending').style.borderColor = 'var(--green)';
    $('gStatusText').textContent = `Verified: ${u.email}`;
    u._method = 'google';
    toast('// Google Verified ✓', 'ok');
    setTimeout(()=>doRedirect(u), 700);
  } catch(e) {
    status.style.display = 'none';
    if (e.code !== 'auth/popup-closed-by-user')
      showMsg('emailMsg', 'Google error: ' + e.message, 'e');
  }
});

// ── OTP countdown ──────────────────────────────────
let cdTimer;
function startCD(sec) {
  const btn=$('resendBtn'), cd=$('resendCd');
  btn.disabled=true; let t=sec;
  cd.textContent=`Resend in ${t}s`;
  clearInterval(cdTimer);
  cdTimer=setInterval(()=>{
    t--; cd.textContent=`Resend in ${t}s`;
    if(t<=0){clearInterval(cdTimer);btn.disabled=false;cd.textContent='';}
  },1000);
}

// ── OTP digit inputs ───────────────────────────────
const boxes = $('otpRow').querySelectorAll('.otp-box');
boxes.forEach((b,i)=>{
  b.addEventListener('input',()=>{
    b.value=b.value.replace(/\D/g,'');
    if(b.value){b.classList.add('ok');if(i<5)boxes[i+1].focus();}
    else b.classList.remove('ok');
  });
  b.addEventListener('keydown',e=>{
    if(e.key==='Backspace'&&!b.value&&i>0){boxes[i-1].focus();boxes[i-1].classList.remove('ok');}
  });
  b.addEventListener('paste',e=>{
    e.preventDefault();
    const p=e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);
    p.split('').forEach((ch,j)=>{if(boxes[j]){boxes[j].value=ch;boxes[j].classList.add('ok');}});
    if(boxes[Math.min(p.length,5)])boxes[Math.min(p.length,5)].focus();
  });
});
const getOTP  = () => [...boxes].map(b=>b.value).join('');
const clearOTP= () => boxes.forEach(b=>{b.value='';b.classList.remove('ok');});

let curEmail = '';

// ── Send OTP ───────────────────────────────────────
$('sendOtpBtn').addEventListener('click', async () => {
  const email = $('emailInp').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showMsg('emailMsg','Enter a valid email address.','e'); return;
  }
  hideMsg('emailMsg');
  setLoad('sendOtpBtn', true, 'Sending OTP...');
  try {
    await sendOTP(email);
    curEmail = email;
    $('otpEmailLbl').textContent = email;
    // Switch to step 2
    $('step1').style.display = 'none';
    $('step2').style.display = 'block';
    clearOTP(); startCD(60);
    setTimeout(()=>boxes[0].focus(), 100);
    showMsg('otpMsg','✓ Code sent! Check inbox & spam folder.','s');
  } catch(e) {
    showMsg('emailMsg','Failed to send: '+e.message,'e');
  } finally {
    setLoad('sendOtpBtn', false, 'Send OTP Code →');
  }
});

// ── Resend ─────────────────────────────────────────
$('resendBtn').addEventListener('click', async () => {
  try {
    await sendOTP(curEmail);
    clearOTP(); startCD(60); boxes[0].focus();
    showMsg('otpMsg','✓ New code sent!','s');
  } catch(e) {
    showMsg('otpMsg','Resend failed: '+e.message,'e');
  }
});

// ── Back button ────────────────────────────────────
$('backBtn').addEventListener('click', () => {
  $('step2').style.display = 'none';
  $('step1').style.display = 'block';
  $('gVerifyStatus').style.display = 'none';
  hideMsg('emailMsg'); hideMsg('otpMsg'); clearOTP();
});

// ── Verify OTP ─────────────────────────────────────
$('verifyBtn').addEventListener('click', async () => {
  const code = getOTP();
  if (code.length !== 6) { showMsg('otpMsg','Enter all 6 digits.','e'); return; }
  hideMsg('otpMsg');
  setLoad('verifyBtn', true, 'Verifying...');
  try {
    const res = verifyOTP(curEmail, code);
    if (!res.ok) { showMsg('otpMsg', res.msg, 'e'); return; }
    // Build a stable UID from email (hashed, consistent)
    const uid = 'otp_' + btoa(unescape(encodeURIComponent(curEmail))).replace(/[^a-zA-Z0-9]/g,'').slice(0,24);
    await saveUser(uid, curEmail, '', '', 'otp');
    doRedirect({ uid, email: curEmail, displayName: curEmail.split('@')[0], photoURL: '', _method: 'otp' });
  } catch(e) {
    showMsg('otpMsg','Error: '+e.message,'e');
  } finally {
    setLoad('verifyBtn', false, 'Verify & Enter →');
  }
});
</script>
</body>
</html>
