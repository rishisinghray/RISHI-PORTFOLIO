<style>
:root{
  --bg:#02040e;--cyan:#00e5ff;--pink:#ff2070;--green:#00ffaa;
  --tb:#e8f4ff;--tm:#8899bb;--td:#445566;
  --bdr:rgba(0,229,255,.15);
  --fhead:'Orbitron',monospace;--fmono:'Share Tech Mono',monospace;--fbody:'Exo 2',sans-serif;
  --cglow:0 0 12px rgba(0,229,255,.4);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow-x:hidden;}
body{background:var(--bg);color:var(--tm);font-family:var(--fbody);display:flex;align-items:center;justify-content:center;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,.012) 2px,rgba(0,229,255,.012) 4px);pointer-events:none;z-index:1;}
canvas{position:fixed;inset:0;z-index:0;}

/* CARD */
.login-page{position:relative;z-index:10;width:100%;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{width:100%;max-width:420px;background:rgba(6,14,30,.92);border:1px solid var(--bdr);padding:32px 28px;position:relative;backdrop-filter:blur(12px);}
.hc{position:absolute;width:14px;height:14px;}
.hc.tl{top:8px;left:8px;border-top:1px solid var(--cyan);border-left:1px solid var(--cyan);}
.hc.tr{top:8px;right:8px;border-top:1px solid var(--cyan);border-right:1px solid var(--cyan);}
.hc.bl{bottom:8px;left:8px;border-bottom:1px solid var(--cyan);border-left:1px solid var(--cyan);}
.hc.br{bottom:8px;right:8px;border-bottom:1px solid var(--cyan);border-right:1px solid var(--cyan);}

/* LOGO */
.logo{font-family:var(--fhead);font-size:1.6rem;font-weight:700;color:var(--cyan);letter-spacing:4px;margin-bottom:4px;}
.sub{font-family:var(--fmono);font-size:.58rem;letter-spacing:3px;color:var(--td);margin-bottom:24px;}

/* STEP BAR */
.step-bar{display:flex;align-items:center;margin-bottom:24px;}
.step{display:flex;align-items:center;gap:7px;font-family:var(--fmono);font-size:.55rem;letter-spacing:2px;color:var(--td);}
.step.on{color:var(--cyan);}
.step.done{color:var(--green);}
.step-dot{width:20px;height:20px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.55rem;flex-shrink:0;}
.step.on .step-dot{background:rgba(0,229,255,.1);}
.step.done .step-dot{background:rgba(0,255,170,.1);}
.step-line{flex:1;height:1px;background:var(--bdr);margin:0 10px;}

/* LABELS */
.lbl{font-family:var(--fmono);font-size:.6rem;letter-spacing:3px;color:var(--td);margin-bottom:8px;display:block;}

/* BUTTONS — large touch targets for mobile */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 20px;font-family:var(--fmono);font-size:.68rem;letter-spacing:2px;border:none;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;min-height:48px;}
.btn-google{background:var(--pink);color:#fff;border:1px solid var(--pink);}
.btn-google:hover,.btn-google:active{background:#d4005a;transform:translateY(-1px);}
.btn-otp{background:transparent;color:var(--cyan);border:1px solid var(--cyan);margin-top:12px;}
.btn-otp:hover,.btn-otp:active{background:rgba(0,229,255,.08);}
.btn-verify{background:var(--cyan);color:var(--bg);font-weight:700;margin-top:14px;}
.btn-verify:hover,.btn-verify:active{background:#00c8e0;}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* INPUT */
.inp-wrap{margin-bottom:12px;}
input.fi{width:100%;background:rgba(0,229,255,.04);border:1px solid var(--bdr);color:var(--tb);font-family:var(--fbody);font-size:.95rem;padding:12px 14px;outline:none;transition:border .2s;min-height:48px;}
input.fi:focus{border-color:var(--cyan);}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;}
.divider-line{flex:1;height:1px;background:var(--bdr);}
.divider-txt{font-family:var(--fmono);font-size:.52rem;letter-spacing:2px;color:var(--td);}

/* MSG */
.msg{font-family:var(--fmono);font-size:.62rem;padding:9px 12px;margin-top:8px;display:none;letter-spacing:1px;}
.msg-e{border:1px solid var(--pink);color:var(--pink);background:rgba(255,32,112,.06);}
.msg-s{border:1px solid var(--green);color:var(--green);background:rgba(0,255,170,.06);}

/* STATUS BOX */
.g-status{display:none;align-items:center;gap:9px;margin-top:8px;font-family:var(--fmono);font-size:.62rem;padding:10px 13px;background:rgba(0,229,255,.05);border:1px solid var(--bdr);letter-spacing:1px;}
.g-status.show{display:flex;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:11px;height:11px;border:1.5px solid var(--cyan);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0;}

/* OTP BOXES */
.otp-hint{font-family:var(--fmono);font-size:.6rem;color:var(--td);margin-bottom:14px;line-height:1.8;letter-spacing:1px;}
.otp-hint strong{color:var(--cyan);}
.otp-row{display:flex;gap:8px;justify-content:center;margin-bottom:4px;}
.otp-box{width:44px;height:54px;text-align:center;font-family:var(--fmono);font-size:1.4rem;font-weight:700;color:var(--cyan);background:rgba(0,229,255,.05);border:1px solid var(--bdr);outline:none;transition:border-color .2s;-webkit-tap-highlight-color:transparent;}
.otp-box:focus{border-color:var(--cyan);box-shadow:var(--cglow);}
.otp-box.ok{border-color:rgba(0,229,255,.5);background:rgba(0,229,255,.07);}
.resend-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px;}
.resend-btn{font-family:var(--fmono);font-size:.58rem;letter-spacing:2px;color:var(--cyan);background:none;border:none;cursor:pointer;padding:8px 0;min-height:44px;-webkit-tap-highlight-color:transparent;}
.resend-btn:disabled{color:var(--td);cursor:not-allowed;}
.resend-cd{font-family:var(--fmono);font-size:.58rem;color:var(--td);}
.back-btn{font-family:var(--fmono);font-size:.56rem;color:var(--td);background:none;border:none;cursor:pointer;padding:10px 0;display:block;width:100%;text-align:left;margin-top:8px;min-height:44px;-webkit-tap-highlight-color:transparent;}
.back-btn:hover,.back-btn:active{color:var(--cyan);}

/* TOAST */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-80px);font-family:var(--fmono);font-size:.65rem;letter-spacing:2px;padding:10px 20px;border-radius:2px;z-index:999;transition:transform .35s;white-space:nowrap;}
.toast.on{transform:translateX(-50%) translateY(0);}
.toast-ok{background:rgba(0,255,170,.12);border:1px solid var(--green);color:var(--green);}
.toast-info{background:rgba(0,229,255,.1);border:1px solid var(--cyan);color:var(--cyan);}
.toast-err{background:rgba(255,32,112,.1);border:1px solid var(--pink);color:var(--pink);}

.foot{font-family:var(--fmono);font-size:.48rem;color:var(--td);letter-spacing:1px;text-align:center;margin-top:18px;}

@media(max-width:480px){
  .card{padding:24px 18px;}
  .otp-box{width:38px;height:48px;font-size:1.2rem;}
  .otp-row{gap:6px;}
}
</style>
</head>

          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>

<!-- Matrix BG -->
<script>
const cv=document.getElementById('bg'),ctx=cv.getContext('2d');
const chars='01アイウエオカキクケコ{}[]<>/\\|';let drops=[];
function rsz(){cv.width=innerWidth;cv.height=innerHeight;drops=Array(Math.floor(cv.width/15)).fill(1)}
function drw(){ctx.fillStyle='rgba(2,4,14,0.07)';ctx.fillRect(0,0,cv.width,cv.height);ctx.font='12px monospace';drops.forEach((y,i)=>{ctx.fillStyle='rgba(0,229,255,.22)';ctx.fillText(chars[Math.floor(Math.random()*chars.length)],i*15,y*15);if(y*15>cv.height&&Math.random()>.975)drops[i]=0;drops[i]++})}
rsz();setInterval(drw,55);window.addEventListener('resize',rsz);
</script>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Firebase config
const cfg = {
  apiKey:            "AIzaSyDULGyjqXeAHm2i6ba3dBzDqJtXojQ-Oro",
  authDomain:        "rishi-0.firebaseapp.com",
  projectId:         "rishi-0",
  storageBucket:     "rishi-0.firebasestorage.app",
  messagingSenderId: "876178991741",
  appId:             "1:876178991741:web:42a0afa29ea9cb5b241f14"
};
const app  = getApps().length ? getApps()[0] : initializeApp(cfg);
const auth = getAuth(app);
const db   = getFirestore(app);
const gp   = new GoogleAuthProvider();
gp.setCustomParameters({ prompt: "select_account" });

const ADMIN_EMAIL = "rishisinghray@gmail.com";
const ADMIN_UID   = "kpFakxL3WjfaQE2KeCepDaO8rHO2";
const SK = "rishi_sess";

function isAdmin(uid, email){ return email?.toLowerCase()===ADMIN_EMAIL||uid===ADMIN_UID; }
function getSess(){ try{const r=localStorage.getItem(SK);if(!r)return null;const d=JSON.parse(r);if(Date.now()-d._ts>7*86400000){localStorage.removeItem(SK);return null;}return d;}catch{return null;} }
function setSess(d){ localStorage.setItem(SK,JSON.stringify({...d,_ts:Date.now()})); }

function $(id){ return document.getElementById(id); }
function toast(msg,type='info'){ const t=$('toast');t.textContent=msg;t.className=`toast toast-${type} on`;setTimeout(()=>t.classList.remove('on'),3500); }
function showMsg(id,txt,type){ const el=$(id);el.textContent=txt;el.className=`msg msg-${type}`;el.style.display='block'; }
function hideMsg(id){ $(id).style.display='none'; }
function setBtnLoad(id,loading,txt){
  const b=$(id); b.disabled=loading;
  b.querySelector('span').innerHTML = loading ? '<span style="display:inline-block;width:10px;height:10px;border:1.5px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px"></span>'+txt : txt;
}

// If already logged in → redirect
const sess = getSess();
onAuthStateChanged(auth, fbUser => {
  if(fbUser || sess){
    const uid   = fbUser?.uid   || sess?.uid   || '';
    const email = fbUser?.email || sess?.email || '';
    location.href = isAdmin(uid,email) ? 'admin.html' : 'portfolio.html';
  }
});

async function saveUser(uid, email, name, photo, method){
  const ref  = doc(db,"users",uid);
  const snap = await getDoc(ref);
  if(!snap.exists()){
    await setDoc(ref,{ uid, email, displayName:name||email.split('@')[0], photoURL:photo, loginMethod:method, isAdmin:isAdmin(uid,email), createdAt:serverTimestamp(), lastLogin:serverTimestamp() });
  } else {
    await setDoc(ref,{ lastLogin:serverTimestamp() },{ merge:true });
  }
}

function doRedirect(uid, email, name, photo, method){
  setSess({ uid, email, name:name||email.split('@')[0], photo:photo||'', isAdmin:isAdmin(uid,email), method });
  toast('// ACCESS GRANTED','ok');
  setTimeout(()=>{ location.href = isAdmin(uid,email) ? 'admin.html' : 'portfolio.html'; }, 700);
}

// ── GOOGLE LOGIN ──────────────────────────────────
$('googleBtn').addEventListener('click', async () => {
  $('gStatus').classList.add('show');
  $('gSpinner').style.display = 'inline-block';
  $('gTxt').textContent = 'Connecting to Google...';
  hideMsg('gMsg');
  $('googleBtn').disabled = true;

  try {
    const result = await signInWithPopup(auth, gp);
    const u = result.user;
    $('gSpinner').style.display = 'none';
    $('gTxt').innerHTML = `<span style="color:var(--green)">✓ ${u.email}</span>`;
    await saveUser(u.uid, u.email, u.displayName, u.photoURL, 'google');
    doRedirect(u.uid, u.email, u.displayName, u.photoURL, 'google');
  } catch(e) {
    $('gStatus').classList.remove('show');
    $('googleBtn').disabled = false;
    if(e.code !== 'auth/popup-closed-by-user'){
      showMsg('gMsg', '// Error: ' + (e.message||e.code), 'e');
    }
  }
});

// ── OTP SEND ─────────────────────────────────────
const EJS = { svc:'service_8250', tpl:'template_8250rishi', key:'d37HyAQ53w40TM5w0' };
const _otp = {};

async function sendOTP(email){
  const code = String(Math.floor(100000+Math.random()*900000));
  _otp[email] = { code, exp: Date.now()+10*60*1000 };
  const res = await fetch('https://api.emailjs.com/api/v1.0/email/send',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ service_id:EJS.svc, template_id:EJS.tpl, user_id:EJS.key,
      template_params:{ to_email:email, otp_code:code } })
  });
  if(!res.ok) throw new Error(await res.text());
}

let curEmail = '';
let cdTimer;

function startCD(s){
  const btn=$('resendBtn'),cd=$('resendCd');
  btn.disabled=true; let t=s;
  cd.textContent=`Resend in ${t}s`;
  clearInterval(cdTimer);
  cdTimer=setInterval(()=>{ t--;cd.textContent=`Resend in ${t}s`;if(t<=0){clearInterval(cdTimer);btn.disabled=false;cd.textContent='';} },1000);
}

$('sendOtpBtn').addEventListener('click', async () => {
  const email = $('emailInp').value.trim();
  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    showMsg('emailMsg','Enter a valid email address.','e'); return;
  }
  hideMsg('emailMsg');
  setBtnLoad('sendOtpBtn', true, 'Sending...');
  try {
    await sendOTP(email);
    curEmail = email;
    $('otpLbl').textContent = email;
    $('s1').style.display = 'none';
    $('s2').style.display = 'block';
    clearOTP(); startCD(60);
    showMsg('otpMsg','✓ Code sent! Check inbox & spam folder.','s');
    setTimeout(()=>boxes[0].focus(), 150);
  } catch(e){
    showMsg('emailMsg','Failed to send: '+e.message,'e');
  } finally {
    setBtnLoad('sendOtpBtn', false, 'Send OTP Code →');
  }
});

// ── OTP BOXES ─────────────────────────────────────
const boxes = document.querySelectorAll('.otp-box');
boxes.forEach((b,i)=>{
  b.addEventListener('input',()=>{
    b.value=b.value.replace(/\D/g,'');
    if(b.value){ b.classList.add('ok'); if(i<5) boxes[i+1].focus(); }
    else b.classList.remove('ok');
  });
  b.addEventListener('keydown',e=>{
    if(e.key==='Backspace'&&!b.value&&i>0){ boxes[i-1].focus(); boxes[i-1].classList.remove('ok'); }
  });
  b.addEventListener('paste',e=>{
    e.preventDefault();
    const p=e.clipboardData.getData('text').replace(/\D/g,'').slice(0,6);
    p.split('').forEach((ch,j)=>{ if(boxes[j]){boxes[j].value=ch;boxes[j].classList.add('ok');} });
    const last=Math.min(p.length,5);
    if(boxes[last]) boxes[last].focus();
  });
});
const getOTP = ()=>[...boxes].map(b=>b.value).join('');
function clearOTP(){ boxes.forEach(b=>{b.value='';b.classList.remove('ok');}); }

// ── VERIFY OTP ────────────────────────────────────
$('verifyBtn').addEventListener('click', async () => {
  const code = getOTP();
  if(code.length!==6){ showMsg('otpMsg','Enter all 6 digits.','e'); return; }
  hideMsg('otpMsg');
  setBtnLoad('verifyBtn', true, 'Verifying...');
  try {
    const entry = _otp[curEmail];
    if(!entry){ showMsg('otpMsg','No OTP found. Request a new one.','e'); return; }
    if(Date.now()>entry.exp){ delete _otp[curEmail]; showMsg('otpMsg','OTP expired. Resend.','e'); return; }
    if(code !== entry.code){ showMsg('otpMsg','Incorrect code. Try again.','e'); return; }
    delete _otp[curEmail];
    const uid = 'otp_'+btoa(curEmail).replace(/[^a-zA-Z0-9]/g,'').slice(0,24);
    await saveUser(uid, curEmail, '', '', 'otp');
    doRedirect(uid, curEmail, curEmail.split('@')[0], '', 'otp');
  } catch(e){
    showMsg('otpMsg','Error: '+e.message,'e');
  } finally {
    setBtnLoad('verifyBtn', false, 'Verify &amp; Enter →');
  }
});

// ── RESEND ────────────────────────────────────────
$('resendBtn').addEventListener('click', async () => {
  try {
    await sendOTP(curEmail);
    clearOTP(); startCD(60);
    showMsg('otpMsg','✓ New code sent!','s');
    setTimeout(()=>boxes[0].focus(),150);
  } catch(e){ showMsg('otpMsg','Resend failed: '+e.message,'e'); }
});

// ── BACK ──────────────────────────────────────────
