<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="google-site-verification" content="FN_rYkDHJwWptDs073ocnqPQl4s5OBSclNzBT82yPGg"/>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6559058832938118" crossorigin="anonymous"></script>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RISHI — Dashboard</title>
<link rel="stylesheet" href="style.css"/>
<link rel="icon" type="image/png" href="favicon.png"/>
<link rel="apple-touch-icon" href="favicon.png"/>
</head>
<body>
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<canvas id="bg-canvas"></canvas>
<div class="scanlines"></div>
<div class="toast toast-info" id="toast"></div>

<nav id="nav" class="solid">
  <div class="nav-logo">RISHI<em>.DASH</em></div>
  <ul class="nav-links">
    <li><a href="portfolio.html">Portfolio</a></li>
    <li><a href="#profile">Profile</a></li>
  </ul>
  <div class="nav-r">
    <div class="nav-pill">
      <div class="av-pl" id="navAvPl">R</div>
      <img class="av" id="navAvImg" src="" style="display:none" alt=""/>
      <span class="nav-em" id="navEmail"></span>
    </div>
    <a href="portfolio.html" class="btn btn-ghost btn-sm"><span>← Portfolio</span></a>
    <button class="btn btn-ghost btn-sm" id="logoutBtn"><span>Logout</span></button>
  </div>
</nav>

<div class="dash-page" id="profile">
  <div class="rv" style="margin-bottom:32px">
    <p class="s-tag">// User Dashboard</p>
    <h2 class="s-title">My Profile</h2>
    <div class="s-line"></div>
  </div>

  <!-- Profile card -->
  <div class="glass profile-card rv" style="position:relative">
    <div class="hc tl"></div><div class="hc br"></div>
    <div class="profile-hdr">
      <div class="p-av-pl" id="profAvPl">R</div>
      <img class="p-av-lg" id="profAvImg" src="" style="display:none" alt=""/>
      <div>
        <div class="p-name" id="profName">Loading...</div>
        <div class="p-email" id="profEmail"></div>
        <span class="pbadge pb-user" id="profBadge">User</span>
      </div>
    </div>
    <div class="p-fields" id="profFields"></div>
  </div>

  <!-- Session info -->
  <div class="glass profile-card rv d1" style="position:relative;margin-bottom:22px">
    <div class="hc tl"></div>
    <p class="s-tag" style="margin-bottom:13px">// Session Status</p>
    <div class="p-fields">
      <div class="pf"><div class="pf-l">Session</div><div class="pf-v" style="color:var(--green)">● Active</div></div>
      <div class="pf"><div class="pf-l">Auth Method</div><div class="pf-v" id="sessMethod">—</div></div>
      <div class="pf"><div class="pf-l">Local Time</div><div class="pf-v" id="sessTime">—</div></div>
      <div class="pf"><div class="pf-l">Admin Access</div><div class="pf-v" id="sessAdmin">—</div></div>
    </div>
  </div>

  <!-- Actions -->
  <div class="rv d2" style="display:flex;gap:12px;flex-wrap:wrap">
    <a href="portfolio.html" class="btn btn-cyan"><span>← Portfolio</span></a>
    <a href="admin.html" id="adminLink" class="btn btn-pink" style="display:none"><span>Admin Panel →</span></a>
    <button class="btn btn-ghost" id="logoutBtn2"><span>Logout</span></button>
  </div>
</div>

<script>
const dot=document.getElementById('cur-dot'),ring=document.getElementById('cur-ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function loop(){dot.style.left=mx+'px';dot.style.top=my+'px';rx+=(mx-rx-15)*.1;ry+=(my-ry-15)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(loop)})();
document.querySelectorAll('button,a').forEach(el=>{el.addEventListener('mouseenter',()=>ring.classList.add('big'));el.addEventListener('mouseleave',()=>ring.classList.remove('big'))});
const cv=document.getElementById('bg-canvas'),ctx=cv.getContext('2d');
let drops=[];function r(){cv.width=innerWidth;cv.height=innerHeight;drops=Array(Math.floor(cv.width/15)).fill(1)}
function d(){ctx.fillStyle='rgba(2,4,14,.07)';ctx.fillRect(0,0,cv.width,cv.height);ctx.font='12px monospace';drops.forEach((y,i)=>{ctx.fillStyle='rgba(0,229,255,.2)';ctx.fillText(Math.random()>.5?'1':'0',i*15,y*15);if(y*15>cv.height&&Math.random()>.975)drops[i]=0;drops[i]++})}
r();setInterval(d,55);window.addEventListener('resize',r);
const ro=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');ro.unobserve(e.target)}})},{threshold:.1});
document.querySelectorAll('.rv').forEach(el=>ro.observe(el));
</script>

<script type="module">
import { auth, db } from './firebase-config.js';
import { onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { getSession, clearSession, checkAdmin } from './auth.js';

const sess = getSession();
const fbUser = await new Promise(r=>{ const u=onAuthStateChanged(auth,f=>{u();r(f)}) });
if(!sess && !fbUser){ location.href='index.html'; }

async function populate(){
  const u=fbUser||sess;
  const email=fbUser?.email||sess?.email||'';
  const name=fbUser?.displayName||sess?.name||email.split('@')[0]||'User';
  const photo=fbUser?.photoURL||sess?.photo||'';
  const uid=fbUser?.uid||sess?.uid||'';
  const method=fbUser?(fbUser.providerData[0]?.providerId==='google.com'?'Google OAuth':'Email OTP'):(sess?.method||'Email OTP');
  const admin=checkAdmin(uid,email);

  // Nav
  document.getElementById('navEmail').textContent=email;
  document.getElementById('navAvPl').textContent=name[0].toUpperCase();
  if(photo){document.getElementById('navAvImg').src=photo;document.getElementById('navAvImg').style.display='block';document.getElementById('navAvPl').style.display='none'}

  // Profile card
  document.getElementById('profName').textContent=name;
  document.getElementById('profEmail').textContent=email;
  document.getElementById('profAvPl').textContent=name[0].toUpperCase();
  if(photo){document.getElementById('profAvImg').src=photo;document.getElementById('profAvImg').style.display='block';document.getElementById('profAvPl').style.display='none'}
  if(admin){
    document.getElementById('profBadge').textContent='⬡ Admin';
    document.getElementById('profBadge').className='pbadge pb-admin';
    document.getElementById('adminLink').style.display='inline-flex';
  }

  // Firestore data
  let fsd={};
  try{const snap=await getDoc(doc(db,'users',uid));if(snap.exists())fsd=snap.data()}catch(_){}

  const joined=fsd.createdAt?new Date(fsd.createdAt.seconds*1000).toLocaleDateString('en-IN',{year:'numeric',month:'short',day:'numeric'}):'N/A';
  document.getElementById('profFields').innerHTML=[
    {l:'Display Name',v:name},{l:'Email',v:email},
    {l:'User ID',v:uid.slice(0,16)+'…'},{l:'Member Since',v:joined},
    {l:'Login Method',v:method},{l:'Account Type',v:admin?'Administrator':'Standard User'},
  ].map(f=>`<div class="pf"><div class="pf-l">${f.l}</div><div class="pf-v">${f.v}</div></div>`).join('');

  document.getElementById('sessMethod').textContent=method;
  document.getElementById('sessTime').textContent=new Date().toLocaleTimeString('en-IN');
  document.getElementById('sessAdmin').textContent=admin?'✓ Granted':'✗ Standard';
  document.getElementById('sessAdmin').style.color=admin?'var(--green)':'var(--td)';
}
populate();

async function doLogout(){if(fbUser)await signOut(auth);clearSession();location.href='index.html'}
document.getElementById('logoutBtn').addEventListener('click',doLogout);
document.getElementById('logoutBtn2').addEventListener('click',doLogout);
</script>
</body>
</html>
